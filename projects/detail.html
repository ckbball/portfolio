<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — Caesar Ladion</title>
    <meta name="description" content="Project case study by Caesar Ladion." />
    <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="min-h-screen">
    <a href="#main" class="skip-link">Skip to content</a>
    <div id="site-header"></div>

    <main id="main" class="container-page py-12 sm:py-16">
      <!-- Not-found state (shown when slug is missing or the file 404s) -->
      <section id="project-not-found" class="hidden py-16 text-center">
        <p class="font-mono text-sm text-accent">404</p>
        <h1 class="mt-3 text-3xl font-bold tracking-tight">Project not found</h1>
        <p class="mt-4 text-muted-foreground">That case study doesn't exist or has moved.</p>
        <div class="mt-8"><a href="/projects/" class="btn-primary">All projects</a></div>
      </section>

      <!-- Loaded state -->
      <article id="project-article" class="hidden">
        <header class="mb-10 border-b border-border pb-8">
          <div class="mb-3 flex flex-wrap items-center gap-2" id="project-tags"></div>
          <h1 id="project-title" class="text-3xl font-bold tracking-tight sm:text-4xl"></h1>
          <p id="project-pitch" class="mt-3 max-w-prose text-lg text-muted-foreground"></p>
          <div id="project-meta" class="mt-5 flex flex-wrap items-center gap-x-5 gap-y-2 text-sm"></div>
        </header>

        <div class="gap-10 lg:grid lg:grid-cols-[1fr_260px]">
          <div id="project-body" class="prose prose-zinc max-w-none dark:prose-invert lg:order-1"></div>

          <aside class="order-2 mb-10 lg:mb-0">
            <div class="lg:sticky lg:top-24">
              <div class="rounded-lg border border-border bg-muted/30 p-5">
                <h2 class="mb-4 text-xs font-semibold uppercase tracking-wide text-muted-foreground">At a glance</h2>
                <dl id="project-glance" class="space-y-4 text-sm"></dl>
              </div>
            </div>
          </aside>
        </div>

        <nav id="project-prevnext" class="mt-14 grid gap-4 border-t border-border pt-8 sm:grid-cols-2"></nav>
      </article>
    </main>

    <div id="site-footer"></div>

    <script src="/assets/js/vendor/jquery.slim.min.js"></script>
    <script src="/assets/js/vendor/marked.min.js"></script>
    <script src="/assets/js/vendor/highlight.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/lib/frontmatter.js"></script>
    <script src="/assets/js/lib/markdown.js"></script>
    <script src="/assets/js/lib/validate.js"></script>
    <script src="/assets/js/lib/reading-time.js"></script>
    <script src="/assets/js/partials.js"></script>
    <script src="/assets/js/project-detail.js"></script>
  </body>
</html>
